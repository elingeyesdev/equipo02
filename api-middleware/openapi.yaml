openapi: 3.0.3
info:
  title: API Middleware Blockchain
  version: 1.0.0
  description: >-
    Contrato base para registrar clientes (Asset) y operaciones de valor (Token)
    sobre la red Hyperledger Fabric del proyecto.

    Autenticación de consumo (hito 2.6): cabecera obligatoria `X-API-Key` en las rutas del contrato.
    El rol efectivo lo determina el servidor según qué variable de entorno coincide con la clave
    (`API_KEY_ADMIN`, `API_KEY_INTEGRADOR`, `API_KEY_SOLO_LECTURA`). Las rutas bajo `/admin/` siguen
    usando `X-Admin-Api-Key` y no forman parte de este esquema.

servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo

tags:
  - name: clientes
    description: Registro y consulta de clientes (Asset)
  - name: tokens
    description: Emisión, transferencia, saldo e historial (Token)
  - name: chaincode
    description: Invocación controlada de chaincode (lista blanca, evaluate o submit)
  - name: eventos
    description: Monitoreo de eventos de Blockchain en tiempo real y consulta de historial

paths:
  /clientes:
    post:
      security:
        - ApiKeyAuth: []
      tags: [clientes]
      summary: Registrar cliente
      description: Registra un nuevo cliente como Asset dentro del sistema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cliente'
            example:
              clienteId: CLI001
              nombre: Juan Perez
              tipoDocumento: CI
              numeroDocumento: "1234567"
              fechaAlta: "2026-04-01"
              estado: ACTIVO
              telefono: "70000000"
              email: juan@gmail.com
              notas: Cliente de prueba
      responses:
        '201':
          description: Cliente registrado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaExitoTx'
              example:
                ok: true
                txId: TX001
                mensaje: Cliente registrado correctamente
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: VALIDACION
                mensaje: Faltan campos obligatorios
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso (solo integrador o admin pueden registrar)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

  /clientes/{clienteId}:
    get:
      security:
        - ApiKeyAuth: []
      tags: [clientes]
      summary: Consultar cliente
      description: Consulta un cliente registrado en el sistema.
      parameters:
        - name: clienteId
          in: path
          required: true
          schema:
            type: string
          example: CLI001
      responses:
        '200':
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaLecturaCliente'
              example:
                ok: true
                codigo: CONSULTA_EXITOSA
                mensaje: Cliente consultado correctamente
                datos:
                  clienteId: CLI001
                  nombre: Juan Perez
                  tipoDocumento: CI
                  numeroDocumento: "1234567"
                  fechaAlta: "2026-04-01"
                  estado: ACTIVO
                  telefono: "70000000"
                  email: juan@gmail.com
                  notas: Cliente de prueba
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: NO_ENCONTRADO
                mensaje: Cliente no registrado
        '500':
          description: Error interno al consultar cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: ERROR_FABRIC
                mensaje: Error interno al consultar cliente en Blockchain
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

  /eventos/stream:
    get:
      security:
        - ApiKeyAuth: []
      tags: [eventos]
      summary: Flujo de eventos de Blockchain en tiempo real (SSE)
      description: Inicia una conexión Server-Sent Events (SSE) para recibir eventos de los contratos configurados.
      responses:
        '200':
          description: Conexión establecida. Los eventos se envían con el prefijo "data:".
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Falta la cabecera X-API-Key
        '403':
          description: API key inválida o rol sin permiso

  /eventos/historial:
    get:
      security:
        - ApiKeyAuth: []
      tags: [eventos]
      summary: Consultar historial de eventos recientes
      description: Obtiene los últimos 100 eventos normalizados almacenados en la memoria del middleware.
      responses:
        '200':
          description: Historial de eventos obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaLectura'
        '401':
          description: Falta la cabecera X-API-Key
        '403':
          description: API key inválida o rol sin permiso

  /operar:
    get:
      security:
        - ApiKeyAuth: []
      tags: [clientes, tokens]
      summary: Operación unificada (consulta — hito 2.4)
      description: >-
        Clasificación por query: con codigoToken se enruta a consulta de saldo; con solo clienteId
        (p. ej. prefijo CLI-) a consulta de cliente. El middleware solo exige que exista al menos
        un query param; la lógica del gateway valida el resto.
      parameters:
        - name: clienteId
          in: query
          required: false
          schema:
            type: string
        - name: codigoToken
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Respuesta del handler enrutado (cliente o saldo)
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Solicitud incompleta o error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '404':
          description: Recurso no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
    post:
      security:
        - ApiKeyAuth: []
      tags: [clientes, tokens]
      summary: Operación unificada (escritura — hito 2.4)
      description: >-
        Clasificación por cuerpo JSON hacia registro de cliente (asset) o emisión/transferencia de
        token. Cuerpo flexible según el tipo detectado.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Operación de token completada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaExitoTx'
        '201':
          description: Cliente registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaExitoTx'
        '400':
          description: Validación, ambigüedad o solicitud incompleta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso (escritura solo integrador o admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

  /chaincode/invocar:
    post:
      security:
        - ApiKeyAuth: []
      tags: [chaincode]
      summary: Invocar chaincode (integrador, lista blanca)
      description: >-
        Ejecuta evaluate o submit solo para combinaciones (canal, contrato, función, modo, número de
        argumentos) permitidas por la política embebida o por CHAINCODE_POLITICAS_FILE. No existe
        invoke genérico: cualquier otra combinación responde 403. Cabecera opcional X-Actor-Id para
        bitácora de auditoría.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolicitudInvocacionChaincode'
            example:
              canal: clientes
              contrato: cliente_cc
              funcion: ReadAsset
              parametros: ["CLI001"]
              modo: evaluate
      responses:
        '200':
          description: Evaluate exitoso (RespuestaLectura) o submit confirmado (RespuestaExitoTx)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RespuestaLectura'
                  - $ref: '#/components/schemas/RespuestaExitoTx'
        '400':
          description: Validación de cuerpo o modo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: >-
            Combinación no permitida por política de chaincode, API key inválida, o rol sin permiso
            (solo integrador o admin vía X-API-Key). Revisar campo `codigo` en el cuerpo JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '404':
          description: Recurso no encontrado en ledger (evaluate/submit)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '500':
          description: Error interno Fabric genérico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '502':
          description: Endoso o confirmación rechazada en Fabric
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '503':
          description: Gateway no conectado, timeout o red no disponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

  /tokens/emitir:
    post:
      security:
        - ApiKeyAuth: []
      tags: [tokens]
      summary: Emitir token
      description: >-
        Emisión real en chaincode token_erc20: Mint a la cuenta del minter (identidad del gateway)
        y Transfer al destinatario. Los campos txId y txIdMint (si aplica) son identificadores de
        transacción confirmados en Fabric. destinatario debe ser una cuenta válida en el contrato
        (p. ej. ClientAccountID / identidad de cliente en Fabric), no necesariamente el clienteId
        del asset cliente_cc. codigoToken no se envía al chaincode (contrato ERC-20 único).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmitirToken'
            example:
              destinatario: eDUwOTo6Q049cmVjaXBpZW50LE9VPWNsaWVudCxPPUh5cGVybGVkZ2VyLFNUPU5vcnRoIENhcm9saW5hLEM9VVM6OkNOPWNhLm9yZzIuZXhhbXBsZS5jb20sTz1vcmcyLmV4YW1wbGUuY29tLEw9SHVyc2xleSxTVD1IYW1wc2hpcmUsQz1VSw==
              monto: 1000
              codigoToken: TOK001
      responses:
        '200':
          description: Token emitido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaExitoTx'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: VALIDACION
                mensaje: El monto debe ser mayor que cero
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso (emisión solo rol admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

  /tokens/transferir:
    post:
      security:
        - ApiKeyAuth: []
      tags: [tokens]
      summary: Transferir token
      description: >-
        Transferencia real en token_erc20: el origen del débito en ledger es la identidad que firma
        (gateway), no el campo origen del JSON (origen es informativo para trazabilidad de negocio).
        destino debe ser cuenta válida en el contrato. codigoToken no se envía al chaincode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferirToken'
            example:
              origen: CLI001
              destino: eDUwOTo6Q049cmVjaXBpZW50LE9VPWNsaWVudCxPPUh5cGVybGVkZ2VyLFNUPU5vcnRoIENhcm9saW5hLEM9VVM6OkNOPWNhLm9yZzIuZXhhbXBsZS5jb20sTz1vcmcyLmV4YW1wbGUuY29tLEw9SHVyc2xleSxTVD1IYW1wc2hpcmUsQz1VSw==
              monto: 250
              codigoToken: TOK001
      responses:
        '200':
          description: Transferencia realizada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaExitoTx'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: SALDO_INVALIDO
                mensaje: El monto debe ser mayor que cero
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso (transferencia solo rol admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

  /tokens/saldo/{clienteId}:
    get:
      security:
        - ApiKeyAuth: []
      tags: [tokens]
      summary: Consultar saldo
      description: >-
        Consulta el saldo de un token para una cuenta del contrato ERC-20.
        El parámetro clienteId aquí representa accountId en ledger (p. ej. ClientAccountID).
        Requiere el código de token como parámetro de consulta (alineado al modelo de datos 1.2).
      parameters:
        - name: clienteId
          in: path
          required: true
          schema:
            type: string
          example: CLI001
        - name: codigoToken
          in: query
          required: true
          description: Código del token cuyo saldo se consulta
          schema:
            type: string
          example: TOK001
      responses:
        '200':
          description: Saldo obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaLecturaSaldoToken'
              example:
                ok: true
                codigo: CONSULTA_EXITOSA
                mensaje: Saldo consultado correctamente
                datos:
                  clienteId: CLI001
                  codigoToken: TOK001
                  saldo: 750
        '404':
          description: Cliente o saldo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: NO_ENCONTRADO
                mensaje: Cliente no registrado o sin saldo para ese token
        '500':
          description: Error interno al consultar saldo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: ERROR_FABRIC
                mensaje: Error interno al consultar saldo en Blockchain
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

  /tokens/historial/{clienteId}:
    get:
      security:
        - ApiKeyAuth: []
      tags: [tokens]
      summary: Consultar historial
      description: >-
        Endpoint reservado para historial por cuenta/token.
        En la versión actual de token_erc20 (sample oficial) no existe función GetHistory por cuenta,
        por lo que este endpoint puede devolver 501 hasta que el chaincode se extienda.
      parameters:
        - name: clienteId
          in: path
          required: true
          schema:
            type: string
          example: CLI001
        - name: codigoToken
          in: query
          required: true
          description: Filtra operaciones solo para este código de token
          schema:
            type: string
          example: TOK001
      responses:
        '200':
          description: Historial obtenido correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorialToken'
              example:
                clienteId: CLI001
                codigoToken: TOK001
                operaciones:
                  - txId: TX100
                    tipo: EMISION
                    monto: 1000
                    codigoToken: TOK001
                  - txId: TX101
                    tipo: TRANSFERENCIA
                    monto: 250
                    codigoToken: TOK001
        '404':
          description: Sin historial para ese cliente y token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: NO_ENCONTRADO
                mensaje: No existe historial para el cliente y token indicados
        '501':
          description: Funcionalidad no implementada en el chaincode actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
              example:
                ok: false
                codigo: NO_IMPLEMENTADO_CHAINCODE
                mensaje: El chaincode token_erc20 actual no expone historial por cuenta
        '401':
          description: Falta la cabecera X-API-Key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'
        '403':
          description: API key inválida o rol sin permiso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RespuestaError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        Credencial del consumidor de la API. El servidor asocia la clave a un rol según
        API_KEY_ADMIN, API_KEY_INTEGRADOR o API_KEY_SOLO_LECTURA (solo una coincide).

  schemas:
    SolicitudInvocacionChaincode:
      type: object
      required:
        - canal
        - contrato
        - funcion
        - modo
      properties:
        canal:
          type: string
          description: Nombre del canal Fabric
          minLength: 1
        contrato:
          type: string
          description: Nombre del chaincode desplegado en el canal
          minLength: 1
        funcion:
          type: string
          description: Nombre de la función del contrato a invocar
          minLength: 1
        parametros:
          type: array
          description: Argumentos posicionales como cadenas (coincidir con número esperado por política)
          items:
            type: string
        modo:
          type: string
          description: evaluate (solo lectura) o submit (escritura confirmada)
          enum: [evaluate, submit]

    Cliente:
      type: object
      required:
        - clienteId
        - nombre
        - tipoDocumento
        - numeroDocumento
        - fechaAlta
        - estado
      properties:
        clienteId:
          type: string
          description: Identificador único del cliente
          minLength: 1
        nombre:
          type: string
          description: Nombre completo del cliente
          minLength: 1
        tipoDocumento:
          type: string
          description: Tipo de documento del cliente
          enum: [CI, NIT, PASAPORTE]
        numeroDocumento:
          type: string
          description: Número de documento del cliente
          minLength: 1
        fechaAlta:
          type: string
          format: date
          description: Fecha de registro del cliente (ISO 8601 fecha)
        estado:
          type: string
          description: Estado actual del cliente
          enum: [ACTIVO, INACTIVO]
        telefono:
          type: string
          description: Teléfono del cliente
        email:
          type: string
          format: email
          description: Correo electrónico del cliente
        notas:
          type: string
          description: Información adicional del cliente

    EmitirToken:
      type: object
      required:
        - destinatario
        - monto
        - codigoToken
      properties:
        destinatario:
          type: string
          description: Cuenta destino en el contrato (p. ej. ClientAccountID en Fabric)
          minLength: 1
        monto:
          type: integer
          format: int64
          description: Cantidad de valor a emitir (unidades mínimas acordadas por el equipo)
          minimum: 1
        codigoToken:
          type: string
          description: Etiqueta lógica en la API; el chaincode token_erc20 no recibe este parámetro
          minLength: 1

    TransferirToken:
      type: object
      required:
        - origen
        - destino
        - monto
        - codigoToken
      properties:
        origen:
          type: string
          description: Informativo; el contrato transfiere desde la identidad del gateway
          minLength: 1
        destino:
          type: string
          description: Cuenta destino en el contrato (p. ej. ClientAccountID en Fabric)
          minLength: 1
        monto:
          type: integer
          format: int64
          description: Cantidad de valor a transferir
          minimum: 1
        codigoToken:
          type: string
          description: Etiqueta lógica en la API; el chaincode token_erc20 no recibe este parámetro
          minLength: 1

    SaldoToken:
      type: object
      required:
        - clienteId
        - codigoToken
        - saldo
      properties:
        clienteId:
          type: string
        codigoToken:
          type: string
        saldo:
          type: integer
          format: int64

    RespuestaLecturaCliente:
      type: object
      required:
        - ok
        - codigo
        - mensaje
        - datos
      properties:
        ok:
          type: boolean
          example: true
        codigo:
          type: string
          example: CONSULTA_EXITOSA
        mensaje:
          type: string
          example: Cliente consultado correctamente
        datos:
          $ref: '#/components/schemas/Cliente'

    RespuestaLecturaSaldoToken:
      type: object
      required:
        - ok
        - codigo
        - mensaje
        - datos
      properties:
        ok:
          type: boolean
          example: true
        codigo:
          type: string
          example: CONSULTA_EXITOSA
        mensaje:
          type: string
          example: Saldo consultado correctamente
        datos:
          $ref: '#/components/schemas/SaldoToken'

    RespuestaLectura:
      type: object
      required:
        - ok
        - codigo
        - mensaje
        - datos
      properties:
        ok:
          type: boolean
          example: true
        codigo:
          type: string
          example: CONSULTA_EXITOSA
        mensaje:
          type: string
          example: Consulta realizada correctamente
        datos:
          description: Payload dinámico de lecturas evaluate (depende de contrato y función).
          oneOf:
            - type: object
            - type: array
              items:
                type: object
            - type: string
            - type: number
            - type: integer
            - type: boolean

    OperacionHistorial:
      type: object
      required:
        - txId
        - tipo
        - monto
        - codigoToken
      properties:
        txId:
          type: string
        tipo:
          type: string
          enum: [EMISION, TRANSFERENCIA]
        monto:
          type: integer
          format: int64
        codigoToken:
          type: string

    HistorialToken:
      type: object
      required:
        - clienteId
        - codigoToken
        - operaciones
      properties:
        clienteId:
          type: string
        codigoToken:
          type: string
        operaciones:
          type: array
          items:
            $ref: '#/components/schemas/OperacionHistorial'

    RespuestaExitoTx:
      type: object
      required:
        - ok
        - txId
        - mensaje
      properties:
        ok:
          type: boolean
          example: true
        txId:
          type: string
        txIdMint:
          type: string
          description: Presente en emisión cuando hubo Mint previo a Transfer
        mensaje:
          type: string

    RespuestaError:
      type: object
      required:
        - ok
        - codigo
        - mensaje
      properties:
        ok:
          type: boolean
          example: false
        codigo:
          type: string
        mensaje:
          type: string
